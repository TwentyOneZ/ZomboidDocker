services:
  pzserver:
    container_name: pz-unstable
    build:
      context: .
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-servertest}
      STEAM_BRANCH: ${STEAM_BRANCH:-unstable}
      UPDATE_ON_START: ${UPDATE_ON_START:-true}
    volumes:
      - ./server:/opt/pzserver
      - ./data:/data
    ports:
      - "16261:16261/udp"
      - "16262-16272:16262-16272/udp"
      - "8766:8766/udp"
      - "8767:8767/udp"
      - "27015:27015/tcp"
    stdin_open: true
    tty: true
